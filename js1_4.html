<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>몇까지 7의 배수를 출력할까요?</title>
</head>
<body>
   <script>
        let num = prompt("숫자를 입력하세요!")
        document.write("7의 배수 : ")
        for ( let i = 1; i < num; i++ ) {
            if ( i % 7 == 0 ) {
                document.write(i )
            }
        }
   </script> 
</body>
</html>
