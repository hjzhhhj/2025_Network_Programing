<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 이상 40 미만인 숫자인지 아닌지 확인하기</title>
</head>
<body>
    <script>
        let num = prompt("숫자를 입력해주세요!");
        num >= 10 && num < 40 ? document.write(num+"은 10 이상, 40 미만입니다!") : document.write(num+"은 10 이상, 40 미만이 아닙니다.")
    </script>
</body>
</html>
