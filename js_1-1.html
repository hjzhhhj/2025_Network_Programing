<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3의 배수 확인하기 ( 삼항연산자 )</title>
</head>
<body>
    <script>
        let num = prompt("숫자를 입력해주세요!");
        num % 3 === 0 ? console.log(num+"은 3의 배수입니다!") : console.log(num+"은 3의 배수가 아닙니다 ㅠㅠ") 
    </script>
</body>
</html>
